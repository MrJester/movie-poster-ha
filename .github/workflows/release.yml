name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify tag matches integration version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version=$(jq -r '.version' custom_components/movie_poster/manifest.json)
          test "$RELEASE_TAG" = "v$version"
      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --prerelease --generate-notes --title "$GITHUB_REF_NAME"
