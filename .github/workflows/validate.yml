name: Validate

on:
  pull_request:
  push:
  workflow_dispatch:

permissions: {}

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: hacs/action@main
        with:
          category: integration
          ignore: description topics

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install frontend test environment
        run: npm install
      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit
      - name: Test responsive renderer
        run: npm run test:frontend

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        home-assistant: ["2026.5", "2026.6", "2026.7"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.2"
      - name: Install test environment
        run: pip install -e '.[test]' "homeassistant~=${{ matrix.home-assistant }}.0"
      - name: Verify dependency environment
        run: pip check
      - name: Lint Python
        run: ruff check .
      - name: Run tests
        run: pytest -ra
