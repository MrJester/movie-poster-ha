name: Validate

on:
  pull_request:
  push:
  workflow_dispatch:

permissions: {}

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        home-assistant: ["2026.5", "2026.6", "2026.7"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e '.[test]' "homeassistant~=${{ matrix.home-assistant }}.0"
      - run: ruff check .
      - run: pytest
